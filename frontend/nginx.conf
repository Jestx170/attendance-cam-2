# HTTP → HTTPS redirect
server {
    listen 80;
    server_name attendance.aacc-ai.com;

    # Let's Encrypt challenge (สำหรับ auto-renew)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect ทุกอย่างไป HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server (main)
server {
    listen 443 ssl;
    http2 on;
    server_name attendance.aacc-ai.com;

    # SSL Certificate (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/attendance.aacc-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/attendance.aacc-ai.com/privkey.pem;

    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend http://backend:8000;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy ไป backend (^~ ป้องกัน regex rule ดัก .jpg)
    location ^~ /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
