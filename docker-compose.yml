services:
  backend:
    build: .
    container_name: face-backend
    volumes:
      - ./registered_faces:/app/registered_faces
      - ./attendance.csv:/app/attendance.csv
      - ./config.json:/app/config.json
      - ./embeddings.json:/app/embeddings.json
      - ./scan_logs:/app/scan_logs
    environment:
      - OPENCV_FFMPEG_CAPTURE_OPTIONS=rtsp_transport;tcp|buffer_size;2048000|stimeout;10000000
    networks:
      - attendance-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: face-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - attendance-net
    restart: unless-stopped

networks:
  attendance-net:
    driver: bridge
